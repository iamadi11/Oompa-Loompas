# Production — uses GitHub Environment "production" (approval gates recommended).
name: Deploy — production

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  quality:
    uses: ./.github/workflows/ci-reusable.yml
    with:
      next_public_api_url: ${{ vars.NEXT_PUBLIC_API_URL }}
    secrets: inherit
    environment: production

  deploy:
    name: Deploy to production
    needs: quality
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy (configure your platform)
        env:
          PRODUCTION_DEPLOY_TOKEN: ${{ secrets.PRODUCTION_DEPLOY_TOKEN }}
        run: |
          echo "Configure this step for your host (Fly.io, Railway, Kubernetes, etc.)."
          echo "Use Environment secrets: PRODUCTION_DEPLOY_TOKEN and vars: PRODUCTION_URL, NEXT_PUBLIC_API_URL."
          if [ -z "${PRODUCTION_DEPLOY_TOKEN:-}" ]; then
            echo "No PRODUCTION_DEPLOY_TOKEN — skipping real deploy (quality gate already passed)."
          fi
