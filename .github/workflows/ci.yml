# Continuous integration — default branch and PRs (no GitHub Environment).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/ci-reusable.yml
    secrets: inherit
